project:
  type: book
  output-dir: docs

book:
  title: "Carrier Throttling Analysis"
  subtitle: "Mobile Broadband Performance and Data Cap Behavior in the US"
  author: "Troy Altus"
  date: "2026"
  repo-url: https://github.com/altustd/carrier-throttling
  chapters:
    - index.qmd
    - part: "Part I: Data"
      chapters:
        - chapters/01-data-sources.qmd
        - chapters/02-data-preparation.qmd
    - part: "Part II: Analysis"
      chapters:
        - chapters/03-carrier-overview.qmd
        - chapters/04-throughput-trends.qmd
        - chapters/05-throttling-detection.qmd

engine: knitr

format:
  html:
    theme: cosmo
    toc: true
    toc-depth: 3
    number-sections: true
    fig-align: center
  pdf:
    pdf-engine: latexmk
    pdf-engine-opts:
      - -lualatex
    documentclass: book
    classoption: [letterpaper, 11pt]
    geometry:
      - top=1in
      - bottom=1in
      - left=1.25in
      - right=1in
    number-sections: true
    colorlinks: true
    toc: true
    toc-depth: 3

execute:
  warning: false
  message: false
  echo: false
